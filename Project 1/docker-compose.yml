version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: intellmeet_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - intellmeet_network

  redis:
    image: redis:7.0-alpine
    container_name: intellmeet_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - intellmeet_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: intellmeet_server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/intellmeet
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=super_secret_jwt_key_change_in_production
      - JWT_REFRESH_SECRET=super_secret_refresh_key_change_in_production
      - CLIENT_ORIGIN=http://localhost:5173
    depends_on:
      - mongodb
      - redis
    networks:
      - intellmeet_network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: intellmeet_client
    ports:
      - "5173:5173"
    environment:
      - API_UPSTREAM=http://server:5000
      - VITE_API_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      - server
    networks:
      - intellmeet_network

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: intellmeet_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - server
    networks:
      - intellmeet_network

  grafana:
    image: grafana/grafana:10.0.0
    container_name: intellmeet_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - intellmeet_network

volumes:
  mongodb_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  intellmeet_network:
    driver: bridge
