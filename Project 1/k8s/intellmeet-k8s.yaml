apiVersion: v1
kind: Namespace
metadata:
  name: intellmeet

---
# ==========================================
# MongoDB Configuration
# ==========================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: intellmeet
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-deployment
  namespace: intellmeet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:6.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db
      volumes:
        - name: mongodb-storage
          persistentVolumeClaim:
            claimName: mongodb-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: intellmeet
spec:
  ports:
    - port: 27017
  selector:
    app: mongodb

---
# ==========================================
# Redis Configuration
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  namespace: intellmeet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.0-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: intellmeet
spec:
  ports:
    - port: 6379
  selector:
    app: redis

---
# ==========================================
# Server backend configuration
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-deployment
  namespace: intellmeet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: intellmeet-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: MONGO_URI
              value: "mongodb://mongodb:27017/intellmeet"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: JWT_SECRET
              value: "super_secret_jwt_key_change_in_production"
            - name: JWT_REFRESH_SECRET
              value: "super_secret_refresh_key_change_in_production"
            - name: NODE_ENV
              value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: intellmeet
spec:
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: server

---
# ==========================================
# Client frontend configuration
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-deployment
  namespace: intellmeet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: intellmeet-client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: intellmeet
spec:
  ports:
    - port: 5173
      targetPort: 5173
  selector:
    app: client

---
# ==========================================
# Ingress Controller Routing Configuration
# ==========================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: intellmeet-ingress
  namespace: intellmeet
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: server
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client
                port:
                  number: 5173
